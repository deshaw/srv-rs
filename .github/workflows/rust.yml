name: Rust

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-C linker=cc -C link-arg=-fuse-ld=bfd"

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Clippy
        run: |
          cargo clippy \
            --workspace \
            --all-features \
            --all-targets \
            -- \
            --deny clippy::all \
            --deny clippy::pedantic \
            --deny clippy::nursery \
            --deny clippy::cargo

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install bubblewrap
        run: sudo apt update && sudo apt install -y bubblewrap
      # Diagnostic steps
      - name: Check glibc version
        run: ldd --version

      - name: Check libresolv location and symbols
        run: |
          # Find libresolv
          find /lib /usr/lib -name 'libresolv*' 2>/dev/null || true

          # Check what symbols are exported (look for dn_expand and res_nsearch variants)
          echo "=== Symbols in libresolv.so ==="
          nm -D /lib/x86_64-linux-gnu/libresolv.so.2 2>/dev/null | grep -E '(dn_expand|res_nsearch)' || true

          # Also check with objdump
          echo "=== Dynamic symbols via objdump ==="
          objdump -T /lib/x86_64-linux-gnu/libresolv.so.2 2>/dev/null | grep -E '(dn_expand|res_nsearch)' || true

      - name: Check libresolv-sys bindings
        run: |
          # See what symbols libresolv-sys is trying to link
          cargo fetch
          find ~/.cargo/registry/src -path '*libresolv-sys*' -name '*.rs' -exec grep -l 'extern' {} \; | head -5 | xargs cat 2>/dev/null || true


      - name: Build
        run: |
          cargo build \
            --workspace \
            --all-features \
            --all-targets \
            --verbose
      - name: Run tests
        run: |
          cargo test \
            --workspace \
            --all-features \
            --all-targets \
            --verbose

  documentation:
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Documentation
        run: |
          cargo doc \
            --workspace \
            --all-features \
            --no-deps
