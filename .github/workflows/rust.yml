name: Rust

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Clippy
        run: |
          cargo clippy \
            --workspace \
            --all-features \
            --all-targets \
            -- \
            --deny clippy::all \
            --deny clippy::pedantic \
            --deny clippy::nursery \
            --deny clippy::cargo

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: |
          cargo build \
            --workspace \
            --all-features \
            --all-targets \
            --verbose
      - name: Run tests
        run: |
          cargo test \
            --workspace \
            --all-features \
            --all-targets \
            --verbose

  documentation:
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Documentation
        run: |
          cargo doc \
            --workspace \
            --all-features \
            --no-deps
